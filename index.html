<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎲 情绪骰子 - 8款主题骰子，摇出今日状态</title>
    
    <!-- CSS 引用 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/dice.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/share.css">
    <link rel="stylesheet" href="css/layout.css">
    
    <!-- 第三方库 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <!-- 环境光背景 -->
    <div class="ambient-light" id="ambientLight"></div>
    
    <!-- 粒子层 -->
    <div id="particles"></div>
    
    <!-- 音效控制 -->
    <button class="sound-toggle" id="soundToggle" title="音效开关">🔊</button>
    
    <div class="container">
        <!-- 顶部 Header -->
        <div class="header">
            <div class="logo">EMOTION DICE</div>
            <h1>今日之卦</h1>
            <p class="tagline">赛博求签的仪式感 · 摇出今日状态</p>
        </div>

        <!-- 模式切换 -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="single">单骰模式</button>
            <button class="mode-tab" data-mode="combo">一卦模式</button>
        </div>

        <!-- ========== 单骰模式面板 ========== -->
        <div class="panel active" id="singlePanel">
            <!-- 主题选择器 -->
            <div class="theme-selector" id="themeChips">
                <!-- 由 app.js 动态渲染 -->
            </div>

            <!-- 骰子场景 -->
            <div id="diceScene">
                <!-- 由 DiceController.initDice 注入内容 -->
            </div>

            <!-- 提示文字 -->
            <p class="hint-text" style="text-align: center; color: var(--text3); font-size: 12px; margin-top: -20px; margin-bottom: 20px;">点击骰子或下方按钮</p>

            <!-- 摇动按钮 -->
            <div style="padding: 0 20px;">
                <button class="btn btn-primary" id="rollButton" style="width: 100%; height: 54px; font-size: 18px; font-weight: 600;">摇一摇 🎲</button>
            </div>

            <!-- 结果卡片 -->
            <div class="result-card" id="resultCard" style="display: none;">
                <div class="result-header">
                    <span class="game-name">🎲 情绪骰子</span>
                    <span class="result-date" id="resultDate"></span>
                </div>
                <div class="result-main">
                    <div class="result-emoji" id="resultEmoji"></div>
                    <div class="result-word" id="resultWord"></div>
                </div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="result-footer">
                    <div class="footer-info">
                        <span class="cta">摇一摇看今日状态</span>
                        <span class="url">yaoyao.vercel.app</span>
                    </div>
                    <div id="resultQRCode" class="qrcode"></div>
                </div>
                <div class="result-actions">
                    <button class="btn btn-primary" style="width: 100%;" onclick="App.shareResult()">分享今日签</button>
                </div>
            </div>
        </div>

        <!-- ========== 组合模式面板 ========== -->
        <div class="panel" id="comboPanel">
            <!-- 组合选择器 -->
            <div class="theme-selector" id="comboSelector">
                <!-- 由 app.js 动态渲染 -->
            </div>

            <!-- 爻位展示 -->
            <div class="yao-cards-container" id="yaoCardsContainer">
                <!-- 由 app.js 动态渲染 -->
            </div>

            <!-- 骰子展示区域 -->
            <div id="comboDiceContainer">
                <!-- 由 DiceController.initDice 注入内容 -->
            </div>

            <!-- 操作区域 -->
            <div style="padding: 0 20px; margin-top: 20px;">
                <button class="btn btn-primary" id="yaoButton" style="width: 100%; height: 54px; font-size: 18px; font-weight: 600;">起卦 🎲</button>
            </div>

            <!-- 卦辞区域 -->
            <div class="interpretation-card" id="comboInterpretation" style="display: none; margin: 24px 20px;">
                <div class="card-title">卦辞解读</div>
                <div class="card-content" id="comboInterpretationText"></div>
            </div>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="share-modal-content">
            <div class="share-modal-header">
                <span class="share-modal-title">保存分享图</span>
                <button class="share-modal-close" id="shareModalClose">×</button>
            </div>
            <div class="share-preview" id="sharePreview"></div>
            <div class="share-actions">
                <p class="share-hint" style="text-align: center; color: var(--text3); font-size: 12px; margin-bottom: 10px;">长按图片保存或发送给朋友</p>
                <button class="btn btn-primary" style="width: 100%;" onclick="App.closeShare()">完成</button>
            </div>
        </div>
    </div>

    <!-- 脚本引用 -->
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/dice.js"></script>
    <script src="js/share.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/global-stats.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // 启动应用
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof App !== 'undefined') {
                App.init();
            }
        });
    </script>
</body>
</html>
