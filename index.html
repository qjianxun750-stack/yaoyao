<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=ZCOOL+XiaoWei&display=swap');

:root {
  --bg: #0C0A18;
  --bg2: #13102A;
  --border: rgba(255,255,255,0.08);
  --text: #fff;
  --text2: rgba(255,255,255,0.45);
  --text3: rgba(255,255,255,0.2);
  --tc: #FF6B6B;
  --tc-glow: rgba(255,107,107,0.35);
  --radius: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* Ambient glow background */
.ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  transition: background 0.8s ease;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 0 0 40px;
}

/* ── Header ── */
header {
  padding: 52px 24px 16px;
  text-align: center;
}
.logo {
  font-size: 13px;
  letter-spacing: 0.15em;
  color: var(--text3);
  margin-bottom: 6px;
  text-transform: uppercase;
}
h1 {
  font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--text);
}
.tagline {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
  letter-spacing: 0.06em;
}

/* ── Tab switch ── */
.tabs {
  display: flex;
  margin: 20px 24px 0;
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 4px;
  gap: 3px;
}
.tab {
  flex: 1;
  padding: 8px 0;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.25s;
  border: none;
  background: transparent;
}
.tab.active {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}

/* ── Theme chips ── */
.themes-scroll {
  display: flex;
  gap: 8px;
  padding: 16px 24px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.themes-scroll::-webkit-scrollbar { display: none; }
.chip {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text2);
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  background: transparent;
}
.chip.active {
  color: var(--bg);
  border-color: var(--tc);
  background: var(--tc);
  font-weight: 600;
}

/* ── Dice stage ── */
.dice-stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px 20px;
  gap: 16px;
}

/* 3D dice */
.dice-scene {
  perspective: 600px;
  width: 140px;
  height: 140px;
  cursor: pointer;
  position: relative;
}

.dice-glow {
  position: absolute;
  inset: -24px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--tc-glow) 0%, transparent 70%);
  animation: pulse-glow 3s ease-in-out infinite;
  pointer-events: none;
  transition: background 0.6s;
}

@keyframes pulse-glow {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.15); opacity: 1; }
}

.dice-3d {
  width: 140px;
  height: 140px;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(-15deg) rotateY(25deg);
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.dice-3d.rolling {
  animation: dice-roll 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}

.dice-3d.landing {
  animation: dice-land 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes dice-roll {
  0%   { transform: rotateX(-15deg) rotateY(25deg) translateY(0px); }
  10%  { transform: rotateX(120deg) rotateY(80deg) translateY(-30px); }
  30%  { transform: rotateX(360deg) rotateY(200deg) translateY(-20px); }
  50%  { transform: rotateX(540deg) rotateY(380deg) translateY(-30px); }
  70%  { transform: rotateX(680deg) rotateY(520deg) translateY(-15px); }
  85%  { transform: rotateX(760deg) rotateY(600deg) translateY(-5px); }
  100% { transform: rotateX(var(--rx, 720deg)) rotateY(var(--ry, 720deg)) translateY(0px); }
}

@keyframes dice-land {
  0%   { transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) scale(1.06); }
  40%  { transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) scale(0.96); }
  70%  { transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) scale(1.02); }
  100% { transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) scale(1); }
}

.face {
  position: absolute;
  width: 140px;
  height: 140px;
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: 1px solid rgba(255,255,255,0.15);
  backface-visibility: hidden;
  transition: background 0.5s;
}
.face-front  { transform: rotateY(0deg)    translateZ(70px); }
.face-back   { transform: rotateY(180deg)  translateZ(70px); }
.face-left   { transform: rotateY(-90deg)  translateZ(70px); }
.face-right  { transform: rotateY(90deg)   translateZ(70px); }
.face-top    { transform: rotateX(90deg)   translateZ(70px); }
.face-bottom { transform: rotateX(-90deg)  translateZ(70px); }

.face-emoji { font-size: 36px; line-height: 1; }
.face-word  { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.3px; text-align: center; padding: 0 8px; }

/* ── Hint text ── */
.hint {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.06em;
  height: 18px;
  transition: opacity 0.3s;
}

/* ── Roll button ── */
.roll-btn {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  color: #fff;
  letter-spacing: 0.05em;
  background: var(--tc);
  position: relative;
  overflow: hidden;
  transition: all 0.2s;
  box-shadow: 0 8px 32px var(--tc-glow);
}
.roll-btn:active { transform: scale(0.97); }
.roll-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.roll-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events: none;
}

/* ── Result card ── */
.result-card {
  margin: 0 24px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
  background: rgba(255,255,255,0.04);
  opacity: 0;
  transform: translateY(16px);
  transition: all 0.5s cubic-bezier(0.34, 1.3, 0.64, 1);
  pointer-events: none;
}
.result-card.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.result-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.result-main {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.result-emoji { font-size: 28px; }
.result-word {
  font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  font-size: 22px;
  color: var(--tc);
}
.result-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  border-top: 1px solid var(--border);
  padding-top: 10px;
  margin-bottom: 14px;
}
.result-actions {
  display: flex;
  gap: 8px;
}
.action-btn {
  flex: 1;
  padding: 10px 0;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.action-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.action-btn.primary {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.15);
  color: var(--text);
}

/* ── Particles ── */
#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particle-fly 0.9s ease-out forwards;
}
@keyframes particle-fly {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

/* ── Share overlay ── */
.share-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  backdrop-filter: blur(8px);
}
.share-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}
.share-modal {
  width: 320px;
  background: var(--bg2);
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  transform: scale(0.9);
  transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
}
.share-overlay.visible .share-modal {
  transform: scale(1);
}

/* Share card image area */
.share-card {
  padding: 32px 28px 28px;
  background: var(--tc);
  position: relative;
  overflow: hidden;
  text-align: center;
}
.share-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: rgba(255,255,255,0.12);
  border-radius: 50%;
}
.share-card::after {
  content: '';
  position: absolute;
  bottom: -20px; left: -20px;
  width: 100px; height: 100px;
  background: rgba(0,0,0,0.1);
  border-radius: 50%;
}
.share-date {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.08em;
  margin-bottom: 20px;
  position: relative; z-index: 1;
}
.share-big-emoji {
  font-size: 56px;
  display: block;
  margin-bottom: 12px;
  position: relative; z-index: 1;
}
.share-big-word {
  font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
  font-size: 32px;
  color: #fff;
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.share-theme-name {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
  position: relative; z-index: 1;
}
.share-desc-area {
  padding: 16px 20px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.share-footer {
  padding: 12px 20px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.share-brand {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.05em;
}
.share-footer-btns {
  display: flex;
  gap: 8px;
}
.share-footer-btn {
  font-size: 12px;
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.share-footer-btn.primary {
  background: var(--tc);
  border-color: var(--tc);
  color: #fff;
  font-weight: 600;
}
.share-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.06);
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

/* ── Sound toggle ── */
.sound-toggle {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 100;
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.06);
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.sound-toggle:hover { background: rgba(255,255,255,0.1); }

/* ── Ripple click effect ── */
.ripple {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: ripple-anim 0.6s linear;
  background: rgba(255,255,255,0.3);
  pointer-events: none;
}
@keyframes ripple-anim {
  to { transform: scale(4); opacity: 0; }
}

/* ── Combo mode ── */
.combo-selector {
  padding: 0 24px 16px;
  display: flex;
  gap: 8px;
}

/* Combo dice stage - initially hidden */
#comboDiceStage {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  min-height: 200px;
  padding: 24px 24px 8px;
}

#comboDiceStage.visible {
  opacity: 1;
  pointer-events: auto;
}

/* Combo dice glow */
#comboDiceGlow {
  background: radial-gradient(circle, var(--tc-glow) 0%, transparent 70%);
}
.combo-chip {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.03);
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.combo-chip.active {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
  color: var(--text);
}

.yao-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 0 24px 16px;
}
.yao-row {
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0.35;
  transition: opacity 0.4s;
}
.yao-row.active { opacity: 1; }
.yao-row.revealed { opacity: 1; }

.yao-badge {
  width: 28px; height: 28px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
  background: var(--tc);
  opacity: 0.6;
  transition: opacity 0.3s;
}
.yao-row.revealed .yao-badge { opacity: 1; }

.yao-box {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.4s;
  min-height: 52px;
}
.yao-row.revealed .yao-box {
  border-color: rgba(255,255,255,0.15);
}
.yao-emoji { font-size: 20px; }
.yao-info .yao-name {
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 2px;
}
.yao-info .yao-word {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.yao-placeholder {
  font-size: 12px;
  color: var(--text3);
}

.guaci-box {
  margin: 0 24px 16px;
  padding: 14px 16px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  font-size: 12px;
  color: var(--text2);
  line-height: 1.7;
  min-height: 54px;
  transition: all 0.4s;
}
.guaci-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

/* Reveal animation */
@keyframes reveal-in {
  0%   { opacity: 0; transform: scale(0.85) rotateX(30deg); }
  60%  { transform: scale(1.04) rotateX(-5deg); }
  100% { opacity: 1; transform: scale(1) rotateX(0deg); }
}
.yao-word.revealed {
  animation: reveal-in 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 2000;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

</style>

<body>

<div class="ambient" id="ambient"></div>
<div id="particles"></div>

<button class="sound-toggle" id="soundToggle" title="音效开关">🔊</button>

<div class="container">
  <header>
    <div class="logo">Emotion Dice · 情绪骰子</div>
    <h1>🎲 今日之卦</h1>
    <div class="tagline">摇一摇，看今天是什么状态</div>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('single')">🎯 单骰模式</button>
    <button class="tab" onclick="setMode('combo')">☯️ 一卦模式</button>
  </div>

  <!-- Single mode content -->
  <div id="single-panel">
    <!-- Theme chips -->
    <div class="themes-scroll" id="themeChips"></div>

    <!-- Dice stage -->
    <div class="dice-stage">
      <div class="dice-scene" id="diceScene" onclick="onDiceClick(event)">
        <div class="dice-glow" id="diceGlow"></div>
        <div class="dice-3d" id="dice3d">
          <div class="face face-front"  id="f0"><span class="face-emoji">😎</span><span class="face-word">小爷来了</span></div>
          <div class="face face-back"   id="f1"><span class="face-emoji">🤖</span><span class="face-word">清醒的NPC</span></div>
          <div class="face face-left"   id="f2"><span class="face-emoji">😵</span><span class="face-word">我在哪</span></div>
          <div class="face face-right"  id="f3"><span class="face-emoji">🪫</span><span class="face-word">电量不足</span></div>
          <div class="face face-top"    id="f4"><span class="face-emoji">😐</span><span class="face-word">继续营业</span></div>
          <div class="face face-bottom" id="f5"><span class="face-emoji">😅</span><span class="face-word">我爱工作</span></div>
        </div>
      </div>
      <div class="hint" id="hint">点击骰子 · 或点击下方按钮</div>
    </div>

    <div style="padding: 0 24px; display: flex; flex-direction: column; gap: 12px;">
      <button class="roll-btn" id="rollBtn" onclick="rollDice()">摇一摇 🎲</button>

      <!-- Result card -->
      <div class="result-card" id="resultCard">
        <div class="result-label">今日卦语</div>
        <div class="result-main">
          <div class="result-emoji" id="resultEmoji">😎</div>

// ── Audio ──
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playRollSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const dist = ctx.createWaveShaper();
        // create subtle distortion curve
        const curve = new Float32Array(256);
        for (let j = 0; j < 256; j++) { const x = (j*2/256)-1; curve[j] = (Math.PI+100)*x/(Math.PI+100*Math.abs(x)); }
        dist.curve = curve;
        osc.connect(dist); dist.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180 + Math.random()*120, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80 + Math.random()*40, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.1);
      }, i * 220);
    }
  } catch(e) {}
}

function playRevealSound(index = 0) {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
    const freq = notes[index % notes.length];
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const reverb = ctx.createConvolver();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.setValueAtTime(freq * 1.002, ctx.currentTime + 0.01);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.6);
    // harmonics
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2;
    gain2.gain.setValueAtTime(0.06, ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function playFinalSound() {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const chord = [261.63, 329.63, 392, 523.25];
    chord.forEach((freq, i) => {
      setTimeout(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.9);
      }, i * 80);
    });
  } catch(e) {}
}

const faceRotations = [
  {rx:0,   ry:0},
  {rx:0,   ry:180},
  {rx:0,   ry:-90},
  {rx:0,   ry:90},
  {rx:-90, ry:0},
  {rx:90,  ry:0}
];

function onDiceClick(e) {
  // ripple
  const scene = document.getElementById('diceScene');
  const r = document.createElement('div');
  r.className = 'ripple';
  const rect = scene.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
  scene.appendChild(r);
  setTimeout(() => r.remove(), 700);
  rollDice();
}

function rollDice() {
  if (isRolling) return;
  isRolling = true;
  const btn = document.getElementById('rollBtn');
  btn.disabled = true;
  btn.textContent = '转动中...';
  document.getElementById('hint').textContent = '🎲 骰子飞起来了...';
  document.getElementById('resultCard').classList.remove('visible');

  playRollSound();

  const faceIdx = Math.floor(Math.random() * 6);
  const rot = faceRotations[faceIdx];
  // Add multiples of 360 for spinning effect
  const finalRx = rot.rx + 720;
  const finalRy = rot.ry + 720;

  const dice3d = document.getElementById('dice3d');
  dice3d.style.cssText = `--rx:${finalRx}deg;--ry:${finalRy}deg;`;
  dice3d.classList.add('rolling');

  setTimeout(() => {
    dice3d.classList.remove('rolling');
    dice3d.classList.add('landing');
    dice3d.style.transition = 'none';
    dice3d.style.transform = `rotateX(${finalRx}deg) rotateY(${finalRy}deg)`;

    setTimeout(() => {
      dice3d.classList.remove('landing');
      playRevealSound(faceIdx);
      createParticles();
      const result = DICE[curDice].faces[faceIdx];
      showSingleResult(result);
      // 记录统计
      trackDiceRoll(DICE[curDice].name, DICE[curDice].id, result);
      document.getElementById('hint').textContent = '✨ 点击骰子再摇一次';
      btn.disabled = false;
      btn.textContent = '再摇一次 🎲';
      isRolling = false;
    }, 400);
  }, 1800);
}

function showSingleResult(face) {
  curResult = face;
  document.getElementById('resultEmoji').textContent = face.e;
  document.getElementById('resultWord').textContent = face.w;
  document.getElementById('resultDesc').textContent = face.d;
  setTimeout(() => document.getElementById('resultCard').classList.add('visible'), 50);
}

// ── Particles ──
function createParticles() {
  const container = document.getElementById('particles');
  const colors = [getComputedStyle(document.documentElement).getPropertyValue('--tc').trim(), '#fff', '#ffd700', '#fff'];
  const scene = document.getElementById('diceScene').getBoundingClientRect();
  const cx = scene.left + scene.width/2;
  const cy = scene.top + scene.height/2;

  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 8;
    const angle = (Math.random() * Math.PI * 2);
    const dist = 80 + Math.random() * 120;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${tx}px; --ty:${ty}px;
      animation-duration:${0.6 + Math.random()*0.5}s;
    `;
    container.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

// ── Mode switch ──
function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (m==='single')));
  document.getElementById('single-panel').style.display = m === 'single' ? 'block' : 'none';
  document.getElementById('combo-panel').style.display = m === 'combo' ? 'flex' : 'none';
  if (m === 'combo') {
    selectCombo(comboIdx, document.querySelectorAll('.combo-chip')[comboIdx]);
  }
}

// ── Combo ──
function selectCombo(i, el) {
  comboIdx = i;
  document.querySelectorAll('.combo-chip').forEach((c,j) => c.classList.toggle('active', j===i));
  applyTheme(COMBOS[i].color);
  resetCombo();
}

function buildYaoList() {
  const combo = COMBOS[comboIdx];
  const list = document.getElementById('yaoList');
  list.innerHTML = '';
  combo.labels.forEach((label, i) => {
    const row = document.createElement('div');
    row.className = 'yao-row' + (i === 0 ? ' active' : '');
    row.id = 'yao-' + i;
    row.innerHTML = `
      <div class="yao-badge">${label}</div>
      <div class="yao-box">
        <div class="yao-emoji" id="yao-emoji-${i}">　</div>
        <div class="yao-info">
          <div class="yao-name">${combo.names[i]}</div>
          <div class="yao-word" id="yao-word-${i}"><span class="yao-placeholder">${i === 0 ? '摇出第一爻' : '待揭晓'}</span></div>
        </div>
      </div>`;
    list.appendChild(row);
  });
}

function resetCombo() {
  yaoResults = [];
  yaoStep = 0;
  buildYaoList();
  document.getElementById('guaciText').textContent = '选择一套玩法，依次摇出三爻，看今日之卦。';
  const btn = document.getElementById('comboRollBtn');
  btn.disabled = false;
  btn.textContent = '起第一爻 🎲';
  const rc = document.getElementById('comboResultCard');
  rc.style.display = 'none';
}

const yaoLabels = [['起第一爻','起第二爻','起第三爻·完卦'],['起天爻','起人爻','起地爻·完卦']];

function rollNextYao() {
  if (isRolling || yaoStep >= 3) return;
  isRolling = true;
  const btn = document.getElementById('comboRollBtn');
  btn.disabled = true;
  btn.textContent = '摇动中...';

  const combo = COMBOS[comboIdx];
  const stepFaces = combo.faces[yaoStep];
  const faceIdx = Math.floor(Math.random() * 6);
  const result = stepFaces[faceIdx];

  // 显示骰子场景
  const comboDiceStage = document.getElementById('comboDiceStage');
  comboDiceStage.classList.add('visible');

  // 加载骰子面内容
  loadComboFaces(combo, yaoStep);

  // 重置骰子姿态
  const comboDice3d = document.getElementById('comboDice3d');
  comboDice3d.style.transition = 'transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94)';
  comboDice3d.style.transform = 'rotateX(-15deg) rotateY(25deg)';

  playRollSound();

  // 执行骰子动画
  setTimeout(() => {
    const rot = faceRotations[faceIdx];
    const finalRx = rot.rx + 720;
    const finalRy = rot.ry + 720;

    comboDice3d.style.cssText = `--rx:${finalRx}deg;--ry:${finalRy}deg;`;
    comboDice3d.classList.add('rolling');

    setTimeout(() => {
      comboDice3d.classList.remove('rolling');
      comboDice3d.classList.add('landing');
      comboDice3d.style.transition = 'none';
      comboDice3d.style.transform = `rotateX(${finalRx}deg) rotateY(${finalRy}deg)`;

      setTimeout(() => {
        comboDice3d.classList.remove('landing');

        // 隐藏骰子场景
        comboDiceStage.classList.remove('visible');

        playRevealSound(yaoStep);
        createParticles();

        // 显示结果到爻位
        yaoResults.push(result);

        const row = document.getElementById('yao-' + yaoStep);
        row.classList.add('revealed');
        document.getElementById('yao-emoji-' + yaoStep).textContent = result.e;
        const wordEl = document.getElementById('yao-word-' + yaoStep);
        wordEl.innerHTML = `<span class="yao-word revealed">${result.w}</span>`;

        // update guaci progressively
        updateGuaci();
        yaoStep++;

        if (yaoStep < 3) {
          // activate next row
          const nextRow = document.getElementById('yao-' + yaoStep);
          if (nextRow) nextRow.classList.add('active');
          btn.disabled = false;
          btn.textContent = yaoLabels[comboIdx][yaoStep];
        } else {
          // complete
          playFinalSound();
          createParticles();
          setTimeout(() => createParticles(), 200);
          const rc = document.getElementById('comboResultCard');
          document.getElementById('comboResultDesc').textContent = combo.interpret(yaoResults);
          rc.style.display = 'block';
          setTimeout(() => rc.classList.add('visible'), 50);
          btn.style.display = 'none';
        }
        isRolling = false;
      }, 400);
    }, 1800);
  }, 100);
}

function updateGuaci() {
  const combo = COMBOS[comboIdx];
  const parts = yaoResults.map((r, i) => `${combo.labels[i]}：${r.w}`);
  let text = parts.join('，');
  if (yaoStep === 2) { // after 3rd yao
    text = combo.interpret(yaoResults);
  }
  document.getElementById('guaciText').textContent = text;
}

// ── Share ──
function showShare() {
  if (!curResult) return;
  const d = DICE[curDice];
  const now = new Date();
  document.getElementById('shareDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  document.getElementById('shareBigEmoji').textContent = curResult.e;
  document.getElementById('shareBigWord').textContent = curResult.w;
  document.getElementById('shareThemeName').textContent = d.name + '骰';
  document.getElementById('shareDescArea').textContent = curResult.d;
  document.getElementById('shareCard').style.background = d.color;
  document.getElementById('shareOverlay').classList.add('visible');
}

function showComboShare() {
  const combo = COMBOS[comboIdx];
  const now = new Date();
  document.getElementById('shareDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  document.getElementById('shareBigEmoji').textContent = yaoResults.map(r=>r.e).join('');
  document.getElementById('shareBigWord').textContent = yaoResults.map(r=>r.w).join(' · ');
  document.getElementById('shareThemeName').textContent = combo.name;
  document.getElementById('shareDescArea').textContent = combo.interpret(yaoResults);
  document.getElementById('shareCard').style.background = combo.color;
  document.getElementById('shareOverlay').classList.add('visible');
}

function hideShare() {
  document.getElementById('shareOverlay').classList.remove('visible');
}

document.getElementById('shareOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('shareOverlay')) hideShare();
});

async function copyShareText() {
  const word = document.getElementById('shareBigWord').textContent;
  const desc = document.getElementById('shareDescArea').textContent;
  const date = document.getElementById('shareDate').textContent;
  const text = `🎲 情绪骰子 · ${date}\n\n「${word}」\n\n${desc}`;

  try {
    await navigator.clipboard.writeText(text);
    await trackShare('text', word);
    showToast('已复制到剪贴板 ✓');
  } catch(e) {
    showToast('请手动复制');
  }
}

async function downloadShare() {
  // 记录分享统计
  const word = document.getElementById('shareBigWord').textContent;
  await trackShare('image', word);

  try {
    const modal = document.getElementById('shareModal');
    const canvas = await html2canvas(modal, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      logging: false
    });

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `情绪骰子_${new Date().getTime()}.png`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('✓ 图片已保存');
    });
  } catch(e) {
    console.log('Canvas error:', e);
    showToast('💡 长按分享图保存到相册，或截图保存');
  }
}

function copyResult() {
  if (!curResult) return;
  const text = `🎲 今日情绪骰子\n\n「${curResult.w}」${curResult.e}\n\n${curResult.d}`;
  navigator.clipboard.writeText(text).then(() => showToast('已复制 ✓')).catch(() => showToast('请手动复制'));
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Sound toggle ──
document.getElementById('soundToggle').addEventListener('click', function() {
  soundOn = !soundOn;
  this.textContent = soundOn ? '🔊' : '🔇';
  showToast(soundOn ? '音效已开启' : '音效已关闭');
});

// ── Init ──
buildChips();
applyTheme(DICE[0].color);
loadFaces(DICE[0]);
buildYaoList();

// Init date in share
const now = new Date();
document.getElementById('shareDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

// 记录访问
trackVisit();
</script>
