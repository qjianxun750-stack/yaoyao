<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 情绪骰子 - 数据分析中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .header-title p {
            color: #666;
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-outline {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .metric-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .metric-change {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .metric-change.positive {
            color: #28a745;
        }

        .metric-change.negative {
            color: #dc3545;
        }

        .metric-change.neutral {
            color: #999;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container {
            position: relative;
            height: 280px;
        }

        .chart-container.large {
            height: 350px;
        }

        .data-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table td {
            font-size: 14px;
            color: #333;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-single {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-combo {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .badge-link {
            background: #fff3e0;
            color: #f57c00;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .funnel-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .funnel-step {
            text-align: center;
            flex: 1;
        }

        .funnel-number {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .funnel-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }

        .funnel-rate {
            font-size: 11px;
            color: #28a745;
            font-weight: 600;
        }

        .funnel-arrow {
            font-size: 24px;
            color: #ccc;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .metrics-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <h1>📊 数据分析中心</h1>
                <p>情绪骰子 v2.1 - 实时数据监控与分析</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="refreshData()">
                    🔄 刷新数据
                </button>
                <button class="btn btn-success" onclick="exportToCSV()">
                    📥 导出CSV
                </button>
                <button class="btn btn-outline" onclick="window.open('index.html', '_blank')">
                    🎮 返回游戏
                </button>
            </div>
        </div>

        <!-- 核心指标 -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">🎲 今日摇骰次数</div>
                <div class="metric-value" id="todayRolls">-</div>
                <div class="metric-change neutral" id="totalRollsChange">总计: -</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">📤 今日分享次数</div>
                <div class="metric-value" id="todayShares">-</div>
                <div class="metric-change neutral" id="totalSharesChange">总计: -</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">👥 独立访客数</div>
                <div class="metric-value" id="uniqueVisitors">-</div>
                <div class="metric-change positive" id="visitorGrowth">↑ -</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">🎯 分享转化率</div>
                <div class="metric-value" id="shareRate">-</div>
                <div class="metric-change neutral">摇骰 → 分享</div>
            </div>
        </div>

        <!-- 图表行1 -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">📈 近7天趋势</div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">🎲 单骰 vs 一卦</div>
                <div class="chart-container">
                    <canvas id="modeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 图表行2 -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">🔥 8个一卦模式排名</div>
                <div class="chart-container">
                    <canvas id="comboChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">⏰ 24小时热力分布</div>
                <div class="chart-container">
                    <canvas id="hourlyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 转化漏斗 -->
        <div class="data-section">
            <div class="section-title">🎯 转化漏斗分析</div>
            <div style="margin-top: 20px;">
                <div class="funnel-container" id="funnelContainer">
                    <div class="loading">加载中</div>
                </div>
            </div>
        </div>

        <!-- 时间维度分析 -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">🌅 时段分布</div>
                <div class="chart-container">
                    <canvas id="timePeriodChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title">📅 工作日 vs 周末</div>
                <div class="chart-container">
                    <canvas id="weekendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- TOP10 热门签文 -->
        <div class="data-section">
            <div class="section-header">
                <div class="section-title">⭐ TOP10 热门签文</div>
            </div>
            <div style="margin-top: 20px;">
                <div class="chart-container large">
                    <canvas id="topResultsChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 最新记录 -->
        <div class="data-section">
            <div class="section-header">
                <div class="section-title">📋 最新摇骰记录</div>
                <div style="font-size: 13px; color: #666;">
                    显示最近 50 条记录
                </div>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>模式</th>
                            <th>主题</th>
                            <th>结果</th>
                            <th>时段</th>
                        </tr>
                    </thead>
                    <tbody id="recentRollsTable">
                        <tr>
                            <td colspan="5" class="loading">加载中</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 会话统计 -->
        <div class="data-section">
            <div class="section-title">📊 会话行为分析</div>
            <div style="margin-top: 20px;">
                <div class="stats-grid" id="sessionStats">
                    <div class="loading">加载中</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载脚本 -->
    <script src="js/config.js?v=2.1"></script>
    <script src="js/supabase-client.js?v=2.1"></script>
    <script src="js/global-stats.js?v=2.1"></script>
    <script src="js/admin.js?v=2.1"></script>
</body>
</html>
